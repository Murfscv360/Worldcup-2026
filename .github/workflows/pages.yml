name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# Pages is already enabled, so we just read its config and deploy (no create).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version (OTA auto-update)
        run: |
          ver="${GITHUB_SHA::7}-$(date -u +%Y%m%d%H%M)"
          sed -i "s/__BUILD__/$ver/g" sw.js assets/app.js
          printf '{"version":"%s","built_at":"%s"}\n' "$ver" "$(date -u +%FT%TZ)" > version.json
          echo "Stamped build $ver"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact (repository root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

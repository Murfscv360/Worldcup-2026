name: Mirror live scores

# Keeps an always-on, same-origin copy of live scores for the web app.
#
# GitHub's cron is best-effort and often only fires a "*/5" schedule every
# 60-90 min, which is far too slow for live matches. So instead of doing one
# fetch per run, each run holds a long-lived POLL LOOP: it fetches
# worldcup26.ir every 30s for ~55 minutes and republishes live.json to the
# `scores` branch whenever the scores actually change. The schedule just needs
# to (re)start a loop roughly once an hour; cancel-in-progress means a newer
# run always replaces an older loop so only one is active.
#
# The app reads live.json from our own CDN origin (raw.githubusercontent) so
# live scores are always reachable in the browser — no CORS/geo/uptime issues.

on:
  schedule:
    - cron: '*/5 * * * *'   # best-effort; really fires ~hourly, restarts the loop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-scores
  cancel-in-progress: true   # a fresh run replaces the running loop

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish branch
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "wc2026-bot@users.noreply.github.com"
          git checkout --orphan scores-pub
          git reset -q            # unstage repo files; commit only the score files

      - name: Poll & mirror live scores (~55 min loop)
        run: |
          SOURCE="https://worldcup26.ir/get/games"
          END=$((SECONDS + 3300))   # ~55 minutes, then the run ends and a new one starts
          last=""
          while :; do
            if curl -fsSL --max-time 25 \
                 -H 'Accept: application/json' \
                 -H 'User-Agent: Mozilla/5.0 (compatible; wc2026-hub mirror)' \
                 "$SOURCE" -o /tmp/new.json; then
              # Only publish valid payloads that actually contain games.
              if node -e "const d=require('/tmp/new.json');const g=Array.isArray(d)?d:d.games;if(!Array.isArray(g)||!g.length)process.exit(1);" 2>/dev/null; then
                cur=$(sha256sum /tmp/new.json | cut -d' ' -f1)
                if [ "$cur" != "$last" ]; then
                  ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  cp /tmp/new.json live.json
                  echo "{\"mirrored_at\":\"$ts\"}" > updated.json
                  git add -f live.json updated.json
                  git commit -q -m "Live scores @ $ts"
                  for try in 1 2 3; do
                    git push -f origin scores-pub:scores && break
                    git fetch -q origin || true
                    sleep $((try * 2))
                  done
                  last=$cur
                  echo "published $ts"
                fi
              else
                echo "$(date -u +%H:%M:%S) payload empty/invalid — keeping previous mirror"
              fi
            else
              echo "$(date -u +%H:%M:%S) fetch failed — keeping previous mirror"
            fi
            [ $SECONDS -ge $END ] && break
            sleep 30
          done

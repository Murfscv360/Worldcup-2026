<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f2f4fb" media="(prefers-color-scheme: light)" />
<meta name="color-scheme" content="dark light" />
<meta name="description" content="Live 2026 FIFA World Cup dashboard — schedule, US TV times, scores, groups & standings, teams, venues and prediction-market odds for the Canada / Mexico / USA tournament." />
<!-- iOS native web-app behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WC 2026" />
<meta name="format-detection" content="telephone=no" />
<title>World Cup 2026 — Live Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<header class="app-header">
  <div class="wrap header-inner">
    <div class="brand">
      <span class="brand-ball">⚽</span>
      <div class="brand-text">
        <h1>World Cup <span>2026</span></h1>
        <p>Canada · Mexico · USA</p>
      </div>
    </div>
    <div class="header-right">
      <button class="fav-btn" id="favBtn" title="Choose your favourite team">⭐ <span id="favBtnLabel">Team</span></button>
      <div class="live-pill" id="livePill" title="Data freshness">
        <span class="dot"></span><span id="liveLabel">Loading…</span>
      </div>
    </div>
  </div>
</header>

<div class="fav-sheet" id="favSheet" hidden>
  <div class="fav-panel">
    <div class="fav-head"><h3>Choose your team</h3><button id="favClose" class="fav-x">✕</button></div>
    <input id="favSearch" type="search" placeholder="Search 48 nations…" />
    <div class="fav-list" id="favList"></div>
  </div>
</div>

<nav class="tabs" id="tabs">
  <button class="tab is-active" data-view="today">Today</button>
  <button class="tab" data-view="live">Live</button>
  <button class="tab" data-view="news">News</button>
  <button class="tab" data-view="schedule">Schedule</button>
  <button class="tab" data-view="groups">Groups</button>
  <button class="tab" data-view="teams">Teams</button>
  <button class="tab" data-view="stats">Players</button>
  <button class="tab" data-view="awards">Boot &amp; Glove</button>
  <button class="tab" data-view="venues">Venues</button>
  <button class="tab" data-view="predictions">Odds</button>
</nav>

<main class="wrap" id="main">
  <div id="view" class="view"></div>
</main>

<nav class="bottom-nav" id="bottomNav">
  <button class="navbtn on" data-view="today">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9"/></svg><span>Home</span>
  </button>
  <button class="navbtn" data-view="live">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg><span>Live</span>
  </button>
  <button class="navbtn" data-view="schedule">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span>Matches</span>
  </button>
  <button class="navbtn" data-view="stats">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><span>Stats</span>
  </button>
  <button class="navbtn" data-view="predictions">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17l6-6 4 4 8-8M21 7v5M21 7h-5"/></svg><span>Odds</span>
  </button>
</nav>

<footer class="app-footer">
  <div class="wrap">
    <p>Live match data: <a href="https://github.com/openfootball/worldcup.json" target="_blank" rel="noopener">openfootball</a> (public domain). Refreshes automatically in your browser.</p>
    <p>All kickoff times shown in US Eastern (ET) and your local time. Not affiliated with FIFA.</p>
  </div>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
